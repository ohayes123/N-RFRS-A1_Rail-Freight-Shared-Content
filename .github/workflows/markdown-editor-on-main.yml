name: Run markdown skill after push to main

on:
  push:
    branches:
      - main

permissions:
  contents: read
  issues: write

jobs:
  ask-copilot:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed Markdown files
        id: changed
        shell: bash
        run: |
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            FILES=$(git ls-files '*.md' '*.mdx' || true)
          else
            FILES=$(git diff --name-only "$BEFORE" "$AFTER" -- '*.md' '*.mdx' || true)
          fi

          {
            echo "files<<EOF"
            echo "$FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Stop when no Markdown files changed
        if: steps.changed.outputs.files == ''
        run: echo "No Markdown changes detected."

      - name: Create issue for Copilot
        if: steps.changed.outputs.files != ''
        id: create-issue
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ github.sha }}
          FILES: ${{ steps.changed.outputs.files }}
        shell: bash
        run: |
          BODY=$(cat <<EOF
          A new commit was pushed to \`main\`.

          Commit:
          \`${SHA}\`

          Changed Markdown files:
          ${FILES}

          Task:
          Review and improve only the Markdown files listed above.

          Instructions:
          - Use the repository Markdown skill if relevant.
          - Keep changes minimal and focused.
          - Preserve meaning and technical accuracy.
          - Standardize headings, lists, spacing, and code fences.
          - Fix obvious relative Markdown link issues when the target is clear.
          - Open a pull request with the documentation updates.
          EOF
          )

          ISSUE_URL=$(gh issue create \
            --repo "$REPO" \
            --title "Copilot: update Markdown after push ${SHA}" \
            --body "$BODY")

          echo "Created issue: $ISSUE_URL"
          ISSUE_NUMBER=$(echo "$ISSUE_URL" | grep -oE '[0-9]+$')
          echo "issue_number=${ISSUE_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Assign Copilot to issue
        if: steps.changed.outputs.files != '' && steps.create-issue.outputs.issue_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          ISSUE_NUMBER="${{ steps.create-issue.outputs.issue_number }}"
          echo "Attempting to assign copilot to issue #${ISSUE_NUMBER}..."

          API_RESPONSE=$(gh api \
            --method POST \
            --silent \
            --include \
            "/repos/${REPO}/issues/${ISSUE_NUMBER}/assignees" \
            --field "assignees[]=copilot" \
            2>&1) || true

          echo "API response:"
          echo "$API_RESPONSE"

          if echo "$API_RESPONSE" | grep -v '^>' | jq -e '.assignees[]? | select(.login == "copilot")' > /dev/null 2>&1; then
            echo "Successfully assigned copilot to issue #${ISSUE_NUMBER}."
          else
            echo "WARNING: Copilot assignment may have failed or copilot was not in the returned assignees list."
            echo "The issue (#${ISSUE_NUMBER}) was still created. You may need to assign Copilot manually,"
            echo "or check that the Copilot coding agent is enabled for this repository."
          fi
